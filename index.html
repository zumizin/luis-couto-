<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Animado</title>
    <style>
        /* Configurações de Fundo */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Fundo Preto */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container do Texto Central */
        .centro {
            text-align: center;
            color: white;
            z-index: 10; /* Garante que o texto fique na frente dos quadrados */
        }

        .linha {
            width: 100%;
            height: 2px;
            background-color: white;
            margin: 10px 0;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Área dos Quadrados Animados */
        .quadrados-container {
            position: absolute;
            bottom: -150px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .quadrado {
            width: 50px;
            height: 50px;
            background-color: white;
            list-style: none;
            animation: subir 10s linear infinite;
        }

        /* Animação: Sobe, Gira e Muda de Cor */
        @keyframes subir {
            0% {
                transform: translateY(0) rotate(0deg);
                background-color: white;
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg);
                background-color: #444; /* Fica cinza */
                opacity: 0.2;
            }
        }

        /* Diferentes tempos e posições para os quadrados */
        .quadrado:nth-child(1) { left: 10%; width: 40px; height: 40px; animation-delay: 0s; }
        .quadrado:nth-child(2) { left: 25%; width: 60px; height: 60px; animation-delay: 2s; animation-duration: 12s; }
        .quadrado:nth-child(3) { left: 45%; width: 30px; height: 30px; animation-delay: 4s; }
        .quadrado:nth-child(4) { left: 70%; width: 80px; height: 80px; animation-delay: 0s; animation-duration: 15s; }
        .quadrado:nth-child(5) { left: 85%; width: 50px; height: 50px; animation-delay: 6s; }

    </style>
</head>
<body>

    <div class="centro">
        <div class="linha"></div>
        <h1>Background Animado</h1>
        <div class="linha"></div>
    </div>

    <ul class="quadrados-container">
        <li class="quadrado"></li>
        <li class="quadrado"></li>
        <li class="quadrado"></li>
        <li class="quadrado"></li>
        <li class="quadrado"></li>
    </ul>

</body>
</html>
